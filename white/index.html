<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Profile</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* main card */
.card {
    text-align: center;
    padding: 30px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
    width: 320px;
}

/* profile image */
.card img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 2px solid white;
}

/* name */
h1 {
    margin: 10px 0 5px;
    font-size: 22px;
}

/* bio */
p {
    font-size: 14px;
    opacity: 0.8;
}

/* buttons */
a {
    display: block;
    margin: 10px 0;
    padding: 10px;
    text-decoration: none;
    color: white;
    background: #ff2e63;
    border-radius: 8px;
    transition: 0.3s;
}

a:hover {
    background: #08d9d6;
    color: black;
}
</style>
</head>

<body>

<div class="card">

    <!-- PROFILE IMAGE -->
    <img src="https://i.imgur.com/8Km9tLL.png" alt="profile">

    <!-- NAME -->
    <h1>YOUR NAME</h1>

    <!-- BIO -->
    <p>🎮 FPS Player | 🇵🇰 Pakistan | 🏆 Grinding for Esports</p>

    <!-- LINKS -->
    <a href="https://discord.com">Discord</a>
    <a href="https://youtube.com">YouTube</a>
    <a href="https://instagram.com">Instagram</a>

</div>

</body>
</html>
